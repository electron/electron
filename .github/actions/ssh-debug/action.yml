name: Debug via SSH
description: Setup a SSH server with a tunnel to access it to debug via SSH.
inputs:
  authorized-users:
    description: 'Comma-separated list of GitHub usernames authorized to access the SSH session'
    required: true
  tunnel:
    description: 'Enable SSH tunneling via cloudflared'
    required: true
    default: 'false'
  hostname:
    description: 'Custom hostname for cloudflared tunnel'
    required: true
  timeout:
    description: 'SSH session timeout in minutes'
    required: false
    type: number
    default: 60
runs:
  using: composite
  steps:
    - run: $GITHUB_ACTION_PATH/setup-ssh.sh
      shell: bash
      env:
        AUTHORIZED_USERS: ${{ inputs.authorized-users }}
        TUNNEL: ${{ inputs.tunnel }}
        TUNNEL_HOSTNAME: ${{ inputs.hostname }}
        TIMEOUT: ${{ inputs.timeout }}
