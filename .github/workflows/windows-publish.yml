name: Publish Windows

on:
  workflow_dispatch:
    inputs:
      build-image-sha:
        type: string
        description: 'SHA for electron/build image'
        default: ''
        required: false
      upload-to-storage:
        description: 'Uploads to Azure storage'
        required: false
        default: '1'
        type: string
      run-windows-publish:
        description: 'Run the publish jobs vs just the build jobs'
        type: boolean
        default: false

permissions: {}

jobs:
  setup:
    if: github.repository == 'electron/electron'
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      build-image-sha: ${{ steps.build-image-sha.outputs.build-image-sha }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Set Build Image SHA
      id: build-image-sha
      uses: ./.github/actions/build-image-sha
      with:
        override: ${{ inputs.build-image-sha }}

  checkout-windows:
    needs: setup
    runs-on: electron-arc-centralus-linux-amd64-32core
    permissions:
      contents: read
    container:
      image: ghcr.io/electron/build:${{ needs.setup.outputs.build-image-sha }}
      options: --user root --device /dev/fuse --cap-add SYS_ADMIN
      volumes:
        - /mnt/win-cache:/mnt/win-cache
        - /var/run/sas:/var/run/sas
    env:
      CHROMIUM_GIT_COOKIE_WINDOWS_STRING: ${{ secrets.CHROMIUM_GIT_COOKIE_WINDOWS_STRING }}
      GCLIENT_EXTRA_ARGS: '--custom-var=checkout_win=True'
      TARGET_OS: 'win'
      ELECTRON_DEPOT_TOOLS_WIN_TOOLCHAIN: '1'
    steps:
    - name: Checkout Electron
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        path: src/electron
        fetch-depth: 0
    - name: Checkout & Sync & Save
      uses: ./src/electron/.github/actions/checkout
      with:
        generate-sas-token: 'true'
        target-platform: win

  # Build the patched siso binary in parallel with checkout-windows; the
  # publish-*-win jobs consume it via SISO_PATH.
  build-siso-windows:
    needs: setup
    uses: ./.github/workflows/pipeline-segment-build-siso-windows.yml
    permissions:
      contents: read

  publish-x64-win:
    uses: ./.github/workflows/pipeline-segment-electron-publish.yml
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    needs: [checkout-windows, build-siso-windows]
    with:
      environment: production-release
      build-runs-on: electron-arc-centralus-windows-amd64-16core
      target-platform: win
      target-arch: x64
      is-release: true
      gn-build-type: release
      generate-symbols: true
      upload-to-storage: ${{ inputs.upload-to-storage }}
    secrets: inherit

  publish-arm64-win:
    uses: ./.github/workflows/pipeline-segment-electron-publish.yml
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    needs: [checkout-windows, build-siso-windows]
    with:
      environment: production-release
      build-runs-on: electron-arc-centralus-windows-amd64-16core
      target-platform: win
      target-arch: arm64
      is-release: true
      gn-build-type: release
      generate-symbols: true
      upload-to-storage: ${{ inputs.upload-to-storage }}
    secrets: inherit

  publish-x86-win:
    uses: ./.github/workflows/pipeline-segment-electron-publish.yml
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    needs: [checkout-windows, build-siso-windows]
    with:
      environment: production-release
      build-runs-on: electron-arc-centralus-windows-amd64-16core
      target-platform: win
      target-arch: x86
      is-release: true
      gn-build-type: release
      generate-symbols: true
      upload-to-storage: ${{ inputs.upload-to-storage }}
    secrets: inherit
