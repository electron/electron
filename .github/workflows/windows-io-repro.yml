name: windows-io-repro

on:
  push:
    branches:
      - sam/windows-io-repro

permissions: {}

env:
  BUILD_IMAGE_SHA: eac3529546ea8f3aa356d31e345715eef342233b

jobs:
  standalone:
    permissions:
      contents: read
    runs-on: electron-arc-centralus-windows-amd64-32core
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: false
      - name: Double-open repro on synthetic files (empty emptyDir)
        shell: powershell
        env:
          REPRO_DIR: ${{ github.workspace }}\repro-files
        run: |
          cd script/windows-io-repro
          go build -o repro.exe .
          .\repro.exe -dir "$env:REPRO_DIR" -files 60000 -rounds 12

  checkout-windows:
    runs-on: electron-arc-centralus-linux-amd64-32core
    permissions:
      contents: read
    container:
      image: ghcr.io/electron/build:eac3529546ea8f3aa356d31e345715eef342233b
      options: --user root --device /dev/fuse --cap-add SYS_ADMIN
      volumes:
        - /mnt/win-cache:/mnt/win-cache
        - /var/run/sas:/var/run/sas
    env:
      CHROMIUM_GIT_COOKIE: ${{ secrets.CHROMIUM_GIT_COOKIE }}
      CHROMIUM_GIT_COOKIE_WINDOWS_STRING: ${{ secrets.CHROMIUM_GIT_COOKIE_WINDOWS_STRING }}
      GCLIENT_EXTRA_ARGS: '--custom-var=checkout_win=True'
      TARGET_OS: 'win'
      ELECTRON_DEPOT_TOOLS_WIN_TOOLCHAIN: '1'
    steps:
      - name: Checkout Electron
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: src/electron
          fetch-depth: 0
      - name: Checkout & Sync & Save
        uses: ./src/electron/.github/actions/checkout
        with:
          generate-sas-token: 'true'
          target-platform: win

  build:
    needs: checkout-windows
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-segment-electron-build.yml
    with:
      build-runs-on: electron-arc-centralus-windows-amd64-32core
      target-platform: win
      target-arch: x64
      is-release: false
      gn-build-type: testing
      generate-symbols: false
      upload-to-storage: '0'
    secrets: inherit
