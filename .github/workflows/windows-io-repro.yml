name: windows-io-repro

on:
  push:
    branches:
      - sam/windows-io-repro

permissions: {}

jobs:
  standalone:
    permissions:
      contents: read
    runs-on: electron-arc-centralus-windows-amd64-32core
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: false
      - name: Double-open repro at scale (synthetic, empty emptyDir)
        shell: powershell
        env:
          REPRO_DIR: ${{ github.workspace }}\repro-files
        run: |
          cd script/windows-io-repro
          go build -o repro.exe .
          .\repro.exe -dir "$env:REPRO_DIR" -files 1100000 -scan-first 60000 -rounds 12
