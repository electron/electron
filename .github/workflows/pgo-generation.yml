name: Generate PGO Profiles

# Builds PGO-instrumented Electron for every published platform/arch that can
# run its own binaries on CI, runs the benchmark workload set against each
# (Speedometer 3, JetStream 2, MotionMark - the same set Chromium's PGO bots
# use), and produces merged .profdata files.
#
# Profiles are always uploaded as workflow artifacts; optionally they are also
# published to the build-tools storage account via OIDC (the pgo-upload
# environment) and served at https://dev-cdn.electronjs.org/pgo/.
#
# Profile coverage (every published Electron platform/arch):
#   - linux x64, arm, arm64    (arm/arm64 run on arm64 CI hosts)
#   - win x64, x86, arm64      (x86 runs on x64 hosts via WOW64)
#   - macos x64, arm64
#
# Architecture: collect jobs produce raw .profraw files (arch-independent
# data); a single x64 merge job converts them to .profdata with the matching
# llvm-profdata, since the LLVM tooling cannot run on the arm collect hosts.
#
# In addition to the C++ binary profiles, the generate-v8-builtins-profiles
# job produces an Electron-specific V8 builtins PGO profile (block hints for
# the code mksnapshot bakes into the snapshot). V8 builtin block graphs are
# arch-independent, so - mirroring upstream V8, where arm64 consumes the x64
# profile - one x64-generated profile covers Electron's x64 and arm64 builds.

on:
  # TEMPORARY: run on pushes to this branch so the workflow can be exercised
  # end-to-end before it lands on main (workflow_dispatch is only available
  # from the default branch). Remove before merging.
  push:
    branches:
      - sam/pgo-generation-infra
  workflow_dispatch:
    inputs:
      build-image-sha:
        type: string
        description: 'Override the build image SHA to use (defaults to pinned SHA)'
        default: ''
        required: false
      skip-linux:
        type: boolean
        description: 'Skip the Linux profiles'
        default: false
        required: false
      skip-macos:
        type: boolean
        description: 'Skip the macOS profiles'
        default: false
        required: false
      skip-windows:
        type: boolean
        description: 'Skip the Windows profiles'
        default: false
        required: false
      upload-to-storage:
        type: boolean
        description: 'Upload generated profiles to Azure blob storage'
        default: true
        required: false

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  setup:
    if: ${{ github.repository == 'electron/electron' }}
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      build-image-sha: ${{ steps.set-output.outputs.build-image-sha }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Get Build Image SHA
      id: set-output
      uses: ./.github/actions/build-image-sha
      with:
        override: ${{ inputs.build-image-sha }}

  # Sync the source tree once per platform (same pattern as build.yml).
  checkout-linux:
    needs: setup
    if: ${{ !inputs.skip-linux }}
    runs-on: electron-arc-centralus-linux-amd64-32core
    permissions:
      contents: read
    container:
      image: ghcr.io/electron/build:${{ needs.setup.outputs.build-image-sha }}
      options: --user root
      volumes:
        - /mnt/cross-instance-cache:/mnt/cross-instance-cache
        - /var/run/sas:/var/run/sas
    env:
      CHROMIUM_GIT_COOKIE: ${{ secrets.CHROMIUM_GIT_COOKIE }}
      GCLIENT_EXTRA_ARGS: '--custom-var=checkout_arm=True --custom-var=checkout_arm64=True'
    outputs:
      build-image-sha: ${{ needs.setup.outputs.build-image-sha }}
    steps:
    - name: Checkout Electron
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
        fetch-depth: 0
    - name: Checkout & Sync & Save
      uses: ./src/electron/.github/actions/checkout

  checkout-macos:
    needs: setup
    if: ${{ !inputs.skip-macos }}
    runs-on: electron-arc-centralus-linux-amd64-32core
    permissions:
      contents: read
    container:
      image: ghcr.io/electron/build:${{ needs.setup.outputs.build-image-sha }}
      options: --user root
      volumes:
        - /mnt/cross-instance-cache:/mnt/cross-instance-cache
        - /var/run/sas:/var/run/sas
    env:
      CHROMIUM_GIT_COOKIE: ${{ secrets.CHROMIUM_GIT_COOKIE }}
      GCLIENT_EXTRA_ARGS: '--custom-var=checkout_mac=True --custom-var=host_os=mac'
    outputs:
      build-image-sha: ${{ needs.setup.outputs.build-image-sha }}
    steps:
    - name: Checkout Electron
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
        fetch-depth: 0
    - name: Checkout & Sync & Save
      uses: ./src/electron/.github/actions/checkout
      with:
        generate-sas-token: 'true'
        target-platform: macos

  checkout-windows:
    needs: setup
    if: ${{ !inputs.skip-windows }}
    runs-on: electron-arc-centralus-linux-amd64-32core
    permissions:
      contents: read
    container:
      image: ghcr.io/electron/build:${{ needs.setup.outputs.build-image-sha }}
      options: --user root
      volumes:
        - /mnt/win-cache:/mnt/win-cache
        - /var/run/sas:/var/run/sas
    env:
      CHROMIUM_GIT_COOKIE: ${{ secrets.CHROMIUM_GIT_COOKIE }}
      GCLIENT_EXTRA_ARGS: '--custom-var=checkout_win=True'
      TARGET_OS: 'win'
    outputs:
      build-image-sha: ${{ needs.setup.outputs.build-image-sha }}
    steps:
    - name: Checkout Electron
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
        fetch-depth: 0
    - name: Checkout & Sync & Save
      uses: ./src/electron/.github/actions/checkout
      with:
        generate-sas-token: 'true'
        target-platform: win

  # Windows builds need the patched siso binary (same as build.yml).
  build-siso-windows:
    needs: setup
    if: ${{ !inputs.skip-windows }}
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-segment-build-siso-windows.yml

  # ---------------------------------------------------------------------------
  # Instrumented builds (gn-build-type: pgo-instrument -> build/args/pgo-instrument.gn)
  # ---------------------------------------------------------------------------

  build-linux-x64:
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/pipeline-segment-electron-build.yml
    needs: checkout-linux
    with:
      build-runs-on: electron-arc-centralus-linux-amd64-32core
      build-container: '{"image":"ghcr.io/electron/build:${{ needs.checkout-linux.outputs.build-image-sha }}","options":"--user root","volumes":["/mnt/cross-instance-cache:/mnt/cross-instance-cache"]}'
      target-platform: linux
      target-arch: x64
      is-release: false
      gn-build-type: pgo-instrument
      generate-symbols: false
      upload-to-storage: '0'
    secrets: inherit

  build-linux-arm:
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/pipeline-segment-electron-build.yml
    needs: checkout-linux
    with:
      build-runs-on: electron-arc-centralus-linux-amd64-32core
      build-container: '{"image":"ghcr.io/electron/build:${{ needs.checkout-linux.outputs.build-image-sha }}","options":"--user root","volumes":["/mnt/cross-instance-cache:/mnt/cross-instance-cache"]}'
      target-platform: linux
      target-arch: arm
      is-release: false
      gn-build-type: pgo-instrument
      generate-symbols: false
      upload-to-storage: '0'
    secrets: inherit

  build-linux-arm64:
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/pipeline-segment-electron-build.yml
    needs: checkout-linux
    with:
      build-runs-on: electron-arc-centralus-linux-amd64-32core
      build-container: '{"image":"ghcr.io/electron/build:${{ needs.checkout-linux.outputs.build-image-sha }}","options":"--user root","volumes":["/mnt/cross-instance-cache:/mnt/cross-instance-cache"]}'
      target-platform: linux
      target-arch: arm64
      is-release: false
      gn-build-type: pgo-instrument
      generate-symbols: false
      upload-to-storage: '0'
    secrets: inherit

  build-macos-x64:
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/pipeline-segment-electron-build.yml
    needs: checkout-macos
    with:
      build-runs-on: macos-15-xlarge
      target-platform: macos
      target-arch: x64
      target-variant: darwin
      is-release: false
      gn-build-type: pgo-instrument
      generate-symbols: false
      upload-to-storage: '0'
    secrets: inherit

  build-macos-arm64:
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/pipeline-segment-electron-build.yml
    needs: checkout-macos
    with:
      build-runs-on: macos-15-xlarge
      target-platform: macos
      target-arch: arm64
      target-variant: darwin
      is-release: false
      gn-build-type: pgo-instrument
      generate-symbols: false
      upload-to-storage: '0'
    secrets: inherit

  build-windows-x64:
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/pipeline-segment-electron-build.yml
    needs: [checkout-windows, build-siso-windows]
    with:
      build-runs-on: electron-arc-centralus-windows-amd64-16core
      target-platform: win
      target-arch: x64
      is-release: false
      gn-build-type: pgo-instrument
      generate-symbols: false
      upload-to-storage: '0'
    secrets: inherit

  build-windows-x86:
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/pipeline-segment-electron-build.yml
    needs: [checkout-windows, build-siso-windows]
    with:
      build-runs-on: electron-arc-centralus-windows-amd64-16core
      target-platform: win
      target-arch: x86
      is-release: false
      gn-build-type: pgo-instrument
      generate-symbols: false
      upload-to-storage: '0'
    secrets: inherit

  build-windows-arm64:
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/pipeline-segment-electron-build.yml
    needs: [checkout-windows, build-siso-windows]
    with:
      build-runs-on: electron-arc-centralus-windows-amd64-16core
      target-platform: win
      target-arch: arm64
      is-release: false
      gn-build-type: pgo-instrument
      generate-symbols: false
      upload-to-storage: '0'
    secrets: inherit

  # ---------------------------------------------------------------------------
  # V8 builtins PGO: build an instrumented d8 with Electron's exact V8
  # configuration and generate the builtins block-hint profile by running
  # JetStream 2 (the same workload upstream V8 uses). Builtin block graphs are
  # arch-independent, so the x64 profile covers x64 and arm64 release builds;
  # 32-bit targets (win-x86, linux-arm) keep using upstream's x86 profile.
  #
  # This is what upstream cannot provide for Electron: Chrome's published
  # builtins profiles reject the promise/async builtins because Electron's
  # Node.js integration changes their codegen (v8_promise_internal_field_count,
  # v8_enable_javascript_promise_hooks).
  # ---------------------------------------------------------------------------

  generate-v8-builtins-profiles:
    name: Generate V8 Builtins Profiles
    needs: checkout-linux
    runs-on: electron-arc-centralus-linux-amd64-32core
    container:
      image: ghcr.io/electron/build:${{ needs.checkout-linux.outputs.build-image-sha }}
      options: --user root
      volumes:
        - /mnt/cross-instance-cache:/mnt/cross-instance-cache
    permissions:
      contents: read
    env:
      ELECTRON_DEPOT_TOOLS_DISABLE_LOG: true
      ELECTRON_OUT_DIR: Default
    steps:
    - name: Checkout Electron
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Install Dependencies
      uses: ./src/electron/.github/actions/install-dependencies
    - name: Set Chromium Git Cookie
      uses: ./src/electron/.github/actions/set-chromium-cookie
    - name: Install Build Tools
      uses: ./src/electron/.github/actions/install-build-tools
    - name: Generate DEPS Hash
      run: |
        node src/electron/script/generate-deps-hash.js
        DEPSHASH=v2-src-cache-$(cat src/electron/.depshash)
        echo "DEPSHASH=$DEPSHASH" >> $GITHUB_ENV
        echo "CACHE_PATH=$DEPSHASH.tar" >> $GITHUB_ENV
    - name: Restore src cache via AKS
      uses: ./src/electron/.github/actions/restore-cache-aks
    - name: Checkout Electron (after cache restore)
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Run Electron Only Hooks
      run: |
        e d gclient runhooks --spec="solutions=[{'name':'src/electron','url':None,'deps_file':'DEPS','custom_vars':{'process_deps':False},'managed':False}]"
    - name: Build Instrumented d8
      run: |
        cd src
        e init -f --root=$(pwd) --out=Default pgo-builtins-x64 --import pgo-builtins-instrument --target-cpu x64 --remote-build siso
        e build --target v8:d8
    - name: Generate Builtins Profile
      run: |
        # JetStream 2.2 at the same pinned revision the browser collection uses.
        git init /tmp/jetstream
        git -C /tmp/jetstream remote add origin https://github.com/WebKit/JetStream.git
        git -C /tmp/jetstream fetch --quiet --depth 1 origin 332d8ee1e4d5c40d9492c56f6865e64a9525ee9f
        git -C /tmp/jetstream checkout --quiet FETCH_HEAD

        # d8's default V8-sandbox reservation aborts in CI containers when the
        # full virtual reservation fails; allow the partial-reservation
        # fallback (matches Chrome/Electron embedder behavior, does not change
        # the profiled builtin code paths).
        D8="$(pwd)/src/out/Default/d8"
        D8_FLAGS="--no-sandbox-prohibit-insecure-mode"
        "$D8" $D8_FLAGS -e "console.log('d8 ok')"

        cd /tmp/jetstream
        "$D8" $D8_FLAGS --turbo-profiling-output=/tmp/v8.builtins.log cli.js
        cd "$GITHUB_WORKSPACE"

        # The profile is final at this point - unlike the C++ .profraw
        # artifacts there is nothing to merge, so it is named for publishing
        # here and uploaded directly by the upload-profiles job.
        TIMESTAMP=$(date +%s)
        SHORT_SHA=$(git -C src/electron rev-parse --short HEAD)
        PROFILE_NAME="electron-v8-x64-${TIMESTAMP}-${SHORT_SHA}.profile"
        mkdir -p src/v8-builtins-profiles
        python3 src/v8/tools/builtins-pgo/get_hints.py /tmp/v8.builtins.log "src/v8-builtins-profiles/$PROFILE_NAME"
        echo "Profile lines: $(wc -l < "src/v8-builtins-profiles/$PROFILE_NAME")"

        # Spot-check: the promise/async builtins that upstream's profile cannot
        # cover for Electron must have hints in ours.
        for builtin in RunMicrotasks AsyncFunctionAwait FulfillPromise PromiseConstructor PromisePrototypeThen; do
          count=$(grep -c ",$builtin," "src/v8-builtins-profiles/$PROFILE_NAME" || true)
          echo "  $builtin: $count hints"
          if [ "$count" -eq 0 ]; then
            echo "ERROR: no hints for $builtin - the profile does not cover Electron's V8 configuration"
            exit 1
          fi
        done
    - name: Upload V8 Builtins Profiles
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: pgo-v8-builtins-profiles
        path: src/v8-builtins-profiles/
        if-no-files-found: error
        retention-days: 7

  # ---------------------------------------------------------------------------
  # Profile collection (runs benchmarks against the instrumented builds and
  # produces raw .profraw artifacts)
  # ---------------------------------------------------------------------------

  collect-linux-x64:
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-segment-pgo-collect.yml
    needs: [checkout-linux, build-linux-x64]
    with:
      target-platform: linux
      target-arch: x64
      artifact-key: linux_x64
      collect-runs-on: electron-arc-centralus-linux-amd64-8core
      collect-container: '{"image":"ghcr.io/electron/build:${{ needs.checkout-linux.outputs.build-image-sha }}","options":"--user root --privileged --init"}'
    secrets: inherit

  collect-linux-arm:
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-segment-pgo-collect.yml
    needs: [checkout-linux, build-linux-arm]
    with:
      target-platform: linux
      target-arch: arm
      artifact-key: linux_arm
      collect-runs-on: electron-arc-centralus-linux-arm64-4core
      collect-container: '{"image":"ghcr.io/electron/test:arm32v7-${{ needs.checkout-linux.outputs.build-image-sha }}","options":"--user root --privileged --init --memory=12g","volumes":["/home/runner/externals:/mnt/runner-externals"]}'
    secrets: inherit

  collect-linux-arm64:
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-segment-pgo-collect.yml
    needs: [checkout-linux, build-linux-arm64]
    with:
      target-platform: linux
      target-arch: arm64
      artifact-key: linux_arm64
      collect-runs-on: ubuntu-22.04-arm
      collect-container: '{"image":"ghcr.io/electron/test:arm64v8-${{ needs.checkout-linux.outputs.build-image-sha }}","options":"--user root --privileged --init"}'
    secrets: inherit

  collect-macos-x64:
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-segment-pgo-collect.yml
    needs: build-macos-x64
    with:
      target-platform: macos
      target-arch: x64
      artifact-key: darwin_x64
      collect-runs-on: macos-15-large
    secrets: inherit

  collect-macos-arm64:
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-segment-pgo-collect.yml
    needs: build-macos-arm64
    with:
      target-platform: macos
      target-arch: arm64
      artifact-key: darwin_arm64
      collect-runs-on: macos-15
    secrets: inherit

  collect-windows-x64:
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-segment-pgo-collect.yml
    needs: build-windows-x64
    with:
      target-platform: win
      target-arch: x64
      artifact-key: win_x64
      collect-runs-on: windows-latest
    secrets: inherit

  collect-windows-x86:
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-segment-pgo-collect.yml
    needs: build-windows-x86
    with:
      target-platform: win
      target-arch: x86
      artifact-key: win_x86
      collect-runs-on: windows-latest
    secrets: inherit

  collect-windows-arm64:
    permissions:
      contents: read
    uses: ./.github/workflows/pipeline-segment-pgo-collect.yml
    needs: build-windows-arm64
    with:
      target-platform: win
      target-arch: arm64
      artifact-key: win_arm64
      collect-runs-on: windows-11-arm
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Merge: one x64 job converts every platform/arch's .profraw set into a
  # named .profdata using the llvm-profdata that matches Electron's clang.
  # ---------------------------------------------------------------------------

  merge-profiles:
    name: Merge Profiles
    needs: [collect-linux-x64, collect-linux-arm, collect-linux-arm64, collect-macos-x64, collect-macos-arm64, collect-windows-x64, collect-windows-x86, collect-windows-arm64]
    # Merge whatever was collected, even if some platforms failed. The
    # repository guard is needed because !cancelled() overrides the skip
    # propagation that normally keeps fork runs from reaching this job.
    if: ${{ !cancelled() && github.repository == 'electron/electron' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Electron
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
    - name: Download Profraw Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        pattern: pgo-profraw-*
        path: profraw
    - name: Merge Profiles
      run: |
        PROFDATA=$(node src/electron/script/pgo/fetch-llvm-profdata.js \
          --deps src/electron/DEPS \
          --output-dir llvm-coverage-tools | tail -1)
        echo "Using llvm-profdata: $PROFDATA"
        "$PROFDATA" --version

        SHORT_SHA=$(git -C src/electron rev-parse --short HEAD)
        TIMESTAMP=$(date +%s)
        mkdir -p profiles
        merged=0
        for dir in profraw/pgo-profraw-*/; do
          [ -d "$dir" ] || continue
          target=$(basename "$dir" | sed 's/^pgo-profraw-//')
          count=$(find "$dir" -name '*.profraw' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "WARNING: no profraw files for $target, skipping"
            continue
          fi
          out="profiles/electron-${target}-${TIMESTAMP}-${SHORT_SHA}.profdata"
          echo "Merging $count profraw files for $target"
          "$PROFDATA" merge -o "$out" "$dir"*.profraw
          merged=$((merged+1))
        done
        if [ "$merged" -eq 0 ]; then
          echo "ERROR: no profiles were merged - every collection failed"
          exit 1
        fi
        echo "Merged $merged profile(s):"
        ls -la profiles/
    - name: Upload Merged Profiles as Workflow Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: pgo-profiles
        path: profiles/
        if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish: a single OIDC-authenticated job uploads the merged profiles to
  # the build-tools storage account, served at https://dev-cdn.electronjs.org/pgo/
  # ---------------------------------------------------------------------------

  upload-profiles:
    name: Upload Profiles to dev-cdn
    # generate-v8-builtins-profiles is in needs only so that its artifact is
    # available when this job runs; its success is NOT required - the C++
    # profiles publish regardless of whether the builtins profile succeeded.
    needs: [merge-profiles, generate-v8-builtins-profiles]
    # Push events (the temporary testing trigger) have no inputs, so they
    # always upload.
    if: ${{ !cancelled() && github.repository == 'electron/electron' && needs.merge-profiles.result == 'success' && (github.event_name == 'push' || inputs.upload-to-storage) }}
    runs-on: ubuntu-latest
    # The pgo-upload environment holds the Azure OIDC credentials and is
    # restricted to protected branches.
    environment: pgo-upload
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Download Merged Profiles
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: pgo-profiles
        path: profiles
    # Optional - the artifact only exists if the V8 builtins job succeeded.
    # Downloaded into the same directory so a single upload-batch publishes
    # everything.
    - name: Download V8 Builtins Profiles
      continue-on-error: true
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: pgo-v8-builtins-profiles
        path: profiles
    - name: Azure Login
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
      with:
        client-id: ${{ secrets.AZURE_OIDC_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_OIDC_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_OIDC_SUBSCRIPTION_ID }}
    - name: Upload Profiles to Azure
      env:
        AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_PGO_STORAGE_ACCOUNT_NAME }}
      run: |
        # Uploads both the C++ .profdata files and the V8 builtins .profile
        # files - the merge job's output directory contains only publishable
        # artifacts.
        az storage blob upload-batch \
          --account-name "$AZURE_STORAGE_ACCOUNT" \
          --destination pgo \
          --source profiles \
          --auth-mode login
        echo "## Uploaded PGO Profiles" >> $GITHUB_STEP_SUMMARY
        for f in profiles/*; do
          echo "- https://dev-cdn.electronjs.org/pgo/$(basename "$f")" >> $GITHUB_STEP_SUMMARY
        done

  # Aggregate gate so a single status reflects the whole run.
  pgo-done:
    needs: [collect-linux-x64, collect-linux-arm, collect-linux-arm64, collect-macos-x64, collect-macos-arm64, collect-windows-x64, collect-windows-x86, collect-windows-arm64, generate-v8-builtins-profiles, merge-profiles, upload-profiles]
    if: always() && !cancelled() && github.repository == 'electron/electron'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Check job statuses
      env:
        NEEDS_CONTEXT: ${{ toJSON(needs) }}
      run: |
        echo "$NEEDS_CONTEXT" | python3 -c '
        import json, sys
        needs = json.load(sys.stdin)
        failed = [k for k, v in needs.items() if v["result"] == "failure"]
        skipped = [k for k, v in needs.items() if v["result"] == "skipped"]
        succeeded = [k for k, v in needs.items() if v["result"] == "success"]
        print(f"succeeded: {succeeded}")
        print(f"skipped:   {skipped}")
        print(f"failed:    {failed}")
        if failed:
            sys.exit(1)
        if not succeeded:
            print("ERROR: every profile job was skipped")
            sys.exit(1)
        '
