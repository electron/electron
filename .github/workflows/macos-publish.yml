name: Publish MacOS

on:
  workflow_dispatch:
    inputs:
      build-image-sha:
        type: string
        description: 'SHA for electron/build image'
        default: ''
        required: false
      upload-to-storage:
        description: 'Uploads to Azure storage'
        required: false
        default: '1'
        type: string
      run-macos-publish:
        description: 'Run the publish jobs vs just the build jobs'
        type: boolean
        default: false

permissions: {}

jobs:
  setup:
    if: github.repository == 'electron/electron'
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      build-image-sha: ${{ steps.build-image-sha.outputs.build-image-sha }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    - name: Set Build Image SHA
      id: build-image-sha
      uses: ./.github/actions/build-image-sha
      with:
        override: ${{ inputs.build-image-sha }}

  checkout-macos:
    needs: setup
    runs-on: electron-arc-centralus-linux-amd64-32core
    permissions:
      contents: read
    container:
      image: ghcr.io/electron/build:${{ needs.setup.outputs.build-image-sha }}
      options: --user root
      volumes:
        - /mnt/cross-instance-cache:/mnt/cross-instance-cache
        - /var/run/sas:/var/run/sas
    env:
      CHROMIUM_GIT_COOKIE: ${{ secrets.CHROMIUM_GIT_COOKIE }}
      GCLIENT_EXTRA_ARGS: '--custom-var=checkout_mac=True --custom-var=host_os=mac'
    steps:
    - name: Checkout Electron
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        path: src/electron
        fetch-depth: 0
    - name: Checkout & Sync & Save
      uses: ./src/electron/.github/actions/checkout
      with:
        generate-sas-token: 'true'
        target-platform: macos

  # Build the patched siso binaries in parallel with checkout-macos; the
  # publish jobs consume the darwin-arm64 artifact via SISO_PATH (macOS builds,
  # x64 and arm64, run on arm64 hosts).
  build-siso:
    needs: setup
    uses: ./.github/workflows/pipeline-segment-build-siso.yml
    permissions:
      contents: read

  publish-x64-darwin:
    uses: ./.github/workflows/pipeline-segment-electron-publish.yml
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    needs: [checkout-macos, build-siso]
    with:
      environment: production-release
      build-runs-on: macos-15-xlarge
      target-platform: macos
      target-arch: x64
      target-variant: darwin
      is-release: true
      publish: true
      gn-build-type: release
      generate-symbols: true
      upload-to-storage: ${{ inputs.upload-to-storage }}
    secrets: inherit

  publish-x64-mas:
    uses: ./.github/workflows/pipeline-segment-electron-publish.yml
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    needs: [checkout-macos, build-siso]
    with:
      environment: production-release
      build-runs-on: macos-15-xlarge
      target-platform: macos
      target-arch: x64
      target-variant: mas
      is-release: true
      publish: true
      gn-build-type: release
      generate-symbols: true
      upload-to-storage: ${{ inputs.upload-to-storage }}
    secrets: inherit

  publish-arm64-darwin:
    uses: ./.github/workflows/pipeline-segment-electron-publish.yml
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    needs: [checkout-macos, build-siso]
    with:
      environment: production-release
      build-runs-on: macos-15-xlarge
      target-platform: macos
      target-arch: arm64
      target-variant: darwin
      is-release: true
      publish: true
      gn-build-type: release
      generate-symbols: true
      upload-to-storage: ${{ inputs.upload-to-storage }}
    secrets: inherit

  publish-arm64-mas:
    uses: ./.github/workflows/pipeline-segment-electron-publish.yml
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    needs: [checkout-macos, build-siso]
    with:
      environment: production-release
      build-runs-on: macos-15-xlarge
      target-platform: macos
      target-arch: arm64
      target-variant: mas
      is-release: true
      publish: true
      gn-build-type: release
      generate-symbols: true
      upload-to-storage: ${{ inputs.upload-to-storage }}
    secrets: inherit
