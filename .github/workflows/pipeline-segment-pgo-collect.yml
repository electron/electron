name: Pipeline Segment - PGO Profile Collection

on:
  workflow_call:
    inputs:
      target-platform:
        type: string
        description: 'Platform to collect on, can be macos, win or linux'
        required: true
      target-arch:
        type: string
        description: 'Arch the instrumented build was made for'
        required: true
      artifact-key:
        type: string
        description: 'Key of the generated_artifacts_* artifact holding the instrumented dist (e.g. linux_x64, darwin_arm64, win_x64)'
        required: true
      collect-runs-on:
        type: string
        description: 'What host to run the profile collection on'
        required: true
      collect-container:
        type: string
        description: 'JSON container information for aks runs-on'
        required: false
        default: '{"image":null}'

concurrency:
  group: electron-pgo-collect-${{ inputs.target-platform }}-${{ inputs.target-arch }}-${{ github.ref_protected == true && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.ref_protected != true }}

permissions: {}

jobs:
  collect:
    runs-on: ${{ inputs.collect-runs-on }}
    container: ${{ fromJSON(inputs.collect-container) }}
    permissions:
      contents: read
    env:
      ELECTRON_OUT_DIR: Default
      BUILD_TYPE: ${{ inputs.target-platform == 'macos' && 'darwin' || inputs.target-platform }}
      TARGET_ARCH: ${{ inputs.target-arch }}
    steps:
    - name: Checkout Electron
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Setup Node.js/npm
      if: ${{ inputs.target-platform != 'linux' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 22.21.x
    - name: Install Dependencies
      uses: ./src/electron/.github/actions/install-dependencies
    - name: Download Generated Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: generated_artifacts_${{ inputs.artifact-key }}
        path: ./generated_artifacts_${{ env.BUILD_TYPE }}_${{ inputs.target-arch }}
    - name: Restore Generated Artifacts
      run: ./src/electron/script/actions/restore-artifacts.sh
    - name: Unzip Dist (win)
      if: ${{ inputs.target-platform == 'win' }}
      shell: powershell
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        cd src/out/Default
        Expand-Archive -Force dist.zip -DestinationPath ./
    - name: Unzip Dist (unix)
      if: ${{ inputs.target-platform != 'win' }}
      run: |
        cd src/out/Default
        unzip -:o dist.zip
    - name: Turn off the unexpectedly quit dialog on macOS
      if: ${{ inputs.target-platform == 'macos' }}
      run: defaults write com.apple.CrashReporter DialogType server
    - name: Turn off the reopen windows prompt on macOS
      if: ${{ inputs.target-platform == 'macos' }}
      run: defaults write com.github.Electron ApplePersistenceIgnoreState YES
    - name: Collect PGO Profile (linux)
      if: ${{ inputs.target-platform == 'linux' }}
      timeout-minutes: 120
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1280x1024x24 -ac &
        cd src
        node electron/script/pgo/collect-profile.js \
          --electron out/Default/electron \
          --output out/Default/electron.profdata \
          --work-dir /tmp/electron-pgo \
          --no-sandbox
    - name: Collect PGO Profile (macos)
      if: ${{ inputs.target-platform == 'macos' }}
      timeout-minutes: 120
      run: |
        cd src
        node electron/script/pgo/collect-profile.js \
          --electron "out/Default/Electron.app/Contents/MacOS/Electron" \
          --output out/Default/electron.profdata \
          --work-dir /tmp/electron-pgo
    - name: Collect PGO Profile (win)
      if: ${{ inputs.target-platform == 'win' }}
      timeout-minutes: 120
      run: |
        cd src
        node electron/script/pgo/collect-profile.js \
          --electron out/Default/electron.exe \
          --output out/Default/electron.profdata \
          --work-dir "$TEMP/electron-pgo"
    - name: Name Profile
      env:
        TARGET_PLATFORM: ${{ inputs.target-platform }}
      run: |
        cd src
        TIMESTAMP=$(date +%s)
        SHORT_SHA=$(git -C electron rev-parse --short HEAD)
        PROFILE_NAME="electron-${TARGET_PLATFORM}-${TARGET_ARCH}-${TIMESTAMP}-${SHORT_SHA}.profdata"
        mkdir -p pgo-profile-upload
        mv out/Default/electron.profdata "pgo-profile-upload/$PROFILE_NAME"
        echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
        echo "Generated profile: $PROFILE_NAME"
        ls -la pgo-profile-upload/
    # The profile is published as a workflow artifact; the upload-profiles job
    # in pgo-generation.yml pushes it to Azure (dev-cdn.electronjs.org/pgo/)
    # via OIDC.
    - name: Upload Profile as Workflow Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: pgo-profile-${{ inputs.target-platform }}-${{ inputs.target-arch }}
        path: src/pgo-profile-upload/
        if-no-files-found: error
