<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>
<body>
  This is the root page
  <script>
    // Reading contentWindow before the iframe's first real navigation can make
    // Blink reuse the initial about:blank V8 context once the frame commits
    // frame.html, instead of creating a fresh one.
    const iframe = document.createElement('iframe');
    iframe.name = 'frameA';
    document.body.appendChild(iframe);
    void iframe.contentWindow;
    iframe.src = './frame.html';
  </script>
</body>
</html>
